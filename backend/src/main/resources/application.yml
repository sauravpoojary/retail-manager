spring:
  application:
    name: store-manager-copilot

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:copilot_db}
    username: ${DB_USER:copilot}
    password: ${DB_PASSWORD:copilot}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080

aws:
  region: ${AWS_REGION:us-east-1}

bedrock:
  model-id: ${BEDROCK_MODEL_ID:anthropic.claude-haiku-4-5-20251001-v1:0}
  max-tokens: ${BEDROCK_MAX_TOKENS:1024}
  temperature: ${BEDROCK_TEMPERATURE:0.7}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

logging:
  level:
    com.retail.copilot: DEBUG
    org.springframework.web: INFO
